name: Dependency Impact Analysis

# Unified workflow for every Dependabot PR (or manual dispatch). It runs two
# independent pipelines in a single job and fuses their outputs into one
# HTML report and one PR comment:
#
#   1. kmp-impact-analyzer — Python pipeline under tools/kmp-impact-analyzer.
#      Static propagation of the dependency bump through Kotlin files, plus
#      Sunburst visualization by source set.
#
#   2. GitGraph — Node.js pipeline under pipeline/. Consumes the GitHub SBOM
#      API to build the full transitive dependency graph and produces
#      arc_diagram.html + a Mermaid subgraph of the PR's impact.
#
# Side effects on the PR:
#   - Labels `common:✅/❌` and `android:✅/❌` reflecting per-target compile.
#   - A single comment bundling both analyses (risk, files, screens, PNG of
#     the sunburst, Mermaid graph of incoming dependents).
#   - A permanent URL on gh-pages pointing to the merged HTML.

on:
  pull_request:
    paths:
      - "**/libs.versions.toml"
      - ".github/workflows/impact-analysis.yml"
      - "tools/kmp-impact-analyzer/**"
      - "pipeline/**"
  workflow_dispatch:
    inputs:
      dependency:
        description: "Dependency group (e.g. io.ktor)"
        required: true
      before_version:
        description: "Version before"
        required: true
      after_version:
        description: "Version after"
        required: true

permissions:
  contents: write        # push to gh-pages-history
  pull-requests: write   # comment + labels
  pages: write
  id-token: write

jobs:
  # ---------------------------------------------------------------------------
  # 1) Detect version change (only on PR). Reuses the kmp-impact CLI.
  # ---------------------------------------------------------------------------
  detect:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
      dependency_group: ${{ steps.detect.outputs.dependency_group }}
      before_version: ${{ steps.detect.outputs.before_version }}
      after_version: ${{ steps.detect.outputs.after_version }}
      catalog_path: ${{ steps.catalog.outputs.catalog_path }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ./tools/kmp-impact-analyzer
      - name: Export catalogs
        id: catalog
        run: |
          set -euo pipefail
          mapfile -t cats < <(git diff --name-only "${{ github.event.pull_request.base.sha }}" "${{ github.event.pull_request.head.sha }}" -- '**/libs.versions.toml')
          if [ "${#cats[@]}" -eq 0 ]; then
            echo "catalog_path=" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "catalog_path=${cats[0]}" >> "$GITHUB_OUTPUT"
          mkdir -p .tmp
          git show "${{ github.event.pull_request.base.sha }}:${cats[0]}" > .tmp/base.toml
          git show "${{ github.event.pull_request.head.sha }}:${cats[0]}" > .tmp/head.toml
      - name: Detect changes
        id: detect
        if: steps.catalog.outputs.catalog_path != ''
        run: kmp-impact detect-version-changes --before .tmp/base.toml --after .tmp/head.toml --format github >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # 2) Analyze — runs both pipelines and produces the merged report.
  # ---------------------------------------------------------------------------
  analyze:
    needs: detect
    if: |
      always() && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'pull_request' && needs.detect.outputs.has_changes == 'true')
      )
    runs-on: ubuntu-latest
    outputs:
      report_path: ${{ steps.pages-meta.outputs.report_path }}
    env:
      DEP_GROUP:  ${{ github.event_name == 'pull_request' && needs.detect.outputs.dependency_group || github.event.inputs.dependency }}
      BEFORE_VER: ${{ github.event_name == 'pull_request' && needs.detect.outputs.before_version  || github.event.inputs.before_version }}
      AFTER_VER:  ${{ github.event_name == 'pull_request' && needs.detect.outputs.after_version   || github.event.inputs.after_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: tools/kmp-impact-analyzer/pyproject.toml

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      # cairosvg rasterizes the Sunburst SVG → PNG for the PR comment
      - name: Install system deps for cairosvg
        run: |
          sudo apt-get update -y
          sudo apt-get install -y libcairo2 libpango-1.0-0 libpangocairo-1.0-0 libgdk-pixbuf2.0-0

      - name: Install analyzer + cairosvg
        run: |
          pip install ./tools/kmp-impact-analyzer
          pip install "cairosvg==2.7.1"

      # ── Per-target compile → PR labels ────────────────────────────────────
      - name: Compile Kotlin targets (AFTER)
        id: compile
        continue-on-error: true
        run: |
          chmod +x gradlew
          common_ok=true; android_ok=true
          ./gradlew :composeApp:compileCommonMainKotlinMetadata --no-daemon 2>&1 | tail -40 \
            || common_ok=false
          ./gradlew :composeApp:compileDebugKotlinAndroid --no-daemon 2>&1 | tail -40 \
            || android_ok=false
          echo "common_ok=$common_ok"  >> "$GITHUB_OUTPUT"
          echo "android_ok=$android_ok" >> "$GITHUB_OUTPUT"

      - name: Apply PR labels (common / android)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          COMMON_OK:  ${{ steps.compile.outputs.common_ok }}
          ANDROID_OK: ${{ steps.compile.outputs.android_ok }}
        with:
          script: |
            const ok   = s => s === 'true';
            const want = new Set([
              ok(process.env.COMMON_OK)  ? 'common:✅'  : 'common:❌',
              ok(process.env.ANDROID_OK) ? 'android:✅' : 'android:❌',
            ]);
            const all = ['common:✅','common:❌','android:✅','android:❌'];
            // Ensure all 4 labels exist with sensible colours.
            const palette = {
              '✅': '0E8A16', '❌': 'D93F0B',
            };
            for (const n of all) {
              const colour = palette[n.slice(-1)];
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner, repo: context.repo.repo, name: n,
                });
              } catch (e) {
                if (e.status === 404) {
                  await github.rest.issues.createLabel({
                    owner: context.repo.owner, repo: context.repo.repo,
                    name: n, color: colour,
                  });
                }
              }
            }
            const pr = context.issue.number;
            const { data: current } = await github.rest.issues.listLabelsOnIssue({
              owner: context.repo.owner, repo: context.repo.repo, issue_number: pr,
            });
            // Strip previous impact labels, then add the new ones.
            for (const l of current) {
              if (all.includes(l.name) && !want.has(l.name)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner, repo: context.repo.repo,
                  issue_number: pr, name: l.name,
                });
              }
            }
            const toAdd = [...want].filter(n => !current.some(l => l.name === n));
            if (toAdd.length) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: pr, labels: toAdd,
              });
            }

      # ── kmp-impact-analyzer ──────────────────────────────────────────────
      - name: Run kmp-impact analyze (static only)
        run: |
          kmp-impact analyze \
            --repo . \
            --dependency "$DEP_GROUP" \
            --before-version "$BEFORE_VER" \
            --after-version "$AFTER_VER" \
            --output-dir /tmp/output \
            --skip-dynamic

      # ── GitGraph: SBOM → graph → impact report ────────────────────────────
      - name: GitGraph — fetch diff
        id: ggdiff
        continue-on-error: true
        env:
          # Dependency-graph API needs `repo` scope. Fall back to default token
          # so PRs without the secret still produce kmp-impact + sunburst output.
          GITHUB_TOKEN:   ${{ secrets.DEP_GRAPH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_OWNER:   ${{ github.repository_owner }}
          GITHUB_REPO:    ${{ github.event.repository.name }}
          BASE_SHA:       ${{ github.event.pull_request.base.sha }}
          HEAD_SHA:       ${{ github.event.pull_request.head.sha }}
          DIFF_OUT_PATH:  pipeline/ci/diff.json
        run: node pipeline/ci/get_diff.js

      - name: GitGraph — fetch SBOM
        id: ggsbom
        continue-on-error: true
        env:
          GITHUB_TOKEN:     ${{ secrets.DEP_GRAPH_PAT || secrets.GITHUB_TOKEN }}
          GITHUB_OWNER:     ${{ github.repository_owner }}
          GITHUB_REPO:      ${{ github.event.repository.name }}
          SBOM_OUTPUT_PATH: pipeline/sbom/sbom.json
        run: node pipeline/sbom/fetch_sbom.js

      - name: GitGraph — transform SBOM
        if: steps.ggsbom.outcome == 'success'
        continue-on-error: true
        env:
          SBOM_INPUT_PATH:   pipeline/sbom/sbom.json
          GRAPH_OUTPUT_PATH: pipeline/sbom/graph.json
        run: node pipeline/sbom/transform_sbom.js

      - name: GitGraph — analyze impact
        id: gganalyze
        if: steps.ggdiff.outcome == 'success' && hashFiles('pipeline/sbom/graph.json') != ''
        continue-on-error: true
        env:
          GRAPH_PATH:     pipeline/sbom/graph.json
          DIFF_PATH:      pipeline/ci/diff.json
          REPORT_PATH:    pipeline/ci/report.json
          PAGES_BASE_URL: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}
        run: node pipeline/ci/analyze_impact.js

      # ── Hydrate GitGraph assets into the merged report ────────────────────
      - name: Hydrate GitGraph into output
        run: |
          mkdir -p /tmp/output/gitgraph
          if [ -f pipeline/visualization/arc_diagram.html ]; then
            cp pipeline/visualization/arc_diagram.html /tmp/output/gitgraph/arc_diagram.html
          fi
          if [ -f pipeline/sbom/graph.json ]; then
            mkdir -p /tmp/output/sbom
            cp pipeline/sbom/graph.json /tmp/output/sbom/graph.json
          fi
          if [ -f pipeline/ci/report.json ]; then
            cp pipeline/ci/report.json /tmp/output/gitgraph/report.json
          fi
          if [ -f pipeline/ci/diff.json ]; then
            cp pipeline/ci/diff.json /tmp/output/gitgraph/diff.json
          fi

      # The iframe uses src="gitgraph/arc_diagram.html" which internally
      # fetches "../sbom/graph.json". Keep the relative layout identical.

      - name: Rebuild report with merged assets
        run: |
          python3 - <<'PY'
          from pathlib import Path
          from kmp_impact_analyzer.contracts import ConsolidatedResult, ShadowManifest
          from kmp_impact_analyzer.reporting.report_site import generate_report_site
          output = Path("/tmp/output")
          consolidated = ConsolidatedResult.model_validate_json(
              (output / "phase4" / "consolidated.json").read_text()
          )
          manifest = ShadowManifest.model_validate_json(
              (output / "phase1" / "manifest.json").read_text()
          )
          generate_report_site(consolidated, manifest, output)
          PY

      # ── Rasterize the Sunburst SVG → PNG for the PR comment ──────────────
      - name: Generate sunburst PNG
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import cairosvg
          from kmp_impact_analyzer.contracts import ConsolidatedResult
          from kmp_impact_analyzer.reporting.sunburst import build_sunburst_svg_standalone
          output = Path("/tmp/output")
          consolidated = ConsolidatedResult.model_validate_json(
              (output / "phase4" / "consolidated.json").read_text()
          )
          svg = build_sunburst_svg_standalone(consolidated)
          (output / "report" / "sunburst.svg").write_text(svg, encoding="utf-8")
          cairosvg.svg2png(
              bytestring=svg.encode("utf-8"),
              write_to=str(output / "report" / "sunburst.png"),
              output_width=720,
          )
          print("sunburst.png generated")
          PY

      - name: Compute report path
        id: pages-meta
        run: |
          python3 - <<'PY'
          import json, os, re
          from pathlib import Path
          s = json.loads(Path("/tmp/output/report/summary.json").read_text())
          slug = lambda v: re.sub(r"[^a-zA-Z0-9]+", "-", v.strip().lower()).strip("-") or "unknown"
          rp = f"reports/{slug(s.get('dependency_group','unknown'))}/{slug(s.get('version_before','b'))}-to-{slug(s.get('version_after','a'))}/run-{os.environ['GITHUB_RUN_ID']}"
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"report_path={rp}\n")
          PY

      - name: Build site bundle
        run: |
          set -euo pipefail
          RP="${{ steps.pages-meta.outputs.report_path }}"
          mkdir -p "site/$RP"
          cp -R /tmp/output/report/. "site/$RP/"
          for p in phase1 phase2 phase3 phase4 phase5 gitgraph sbom; do
            if [ -d "/tmp/output/$p" ]; then
              cp -R "/tmp/output/$p" "site/$RP/"
            fi
          done

      - run: cat /tmp/output/report/summary.md >> "$GITHUB_STEP_SUMMARY"

      - uses: actions/upload-artifact@v4
        with:
          name: impact-analysis-results
          path: /tmp/output/

      - uses: actions/upload-artifact@v4
        with:
          name: impact-report-site
          path: site/
          retention-days: 30

      # ── PR comment combining both pipelines (always run if analyze didn't bail early) ──
      - name: Comment PR
        if: always() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        env:
          REPORT_PATH: ${{ steps.pages-meta.outputs.report_path }}
          REPO_NAME:   ${{ github.event.repository.name }}
          REPO_OWNER:  ${{ github.repository_owner }}
        with:
          script: |
            const fs = require('fs');
            const base      = `https://${process.env.REPO_OWNER}.github.io/${process.env.REPO_NAME}`;
            const reportUrl = `${base}/${process.env.REPORT_PATH}/`;
            const sunburstUrl = `${reportUrl}sunburst.png`;

            const s = JSON.parse(fs.readFileSync('/tmp/output/report/summary.json', 'utf8'));

            let ggMarkdown = null;
            try {
              const gg = JSON.parse(fs.readFileSync('/tmp/output/gitgraph/report.json','utf8'));
              ggMarkdown = gg.markdown;
            } catch (_) {}

            const lines = [
              '<!-- impact-analysis-bot -->',
              `Bumps \`${s.dependency_group}\` from \`${s.version_before}\` to \`${s.version_after}\`.`,
              '',
              '### 📦 Dependabot impact companion (kmp-impact-analyzer)',
              '',
              `- Risk: **${(s.risk_level || 'low').toUpperCase()}**`,
              `- Impacted files: ${s.total_impacted_files ?? 0}`,
              `- Impacted screens: ${s.total_impacted_screens ?? 0}`,
              `- Dynamic analysis: ${s.dynamic_summary}`,
              `- Recommendation: ${s.recommendation}`,
              '',
              `![Source-set sunburst](${sunburstUrl})`,
              '',
            ];

            if (ggMarkdown) {
              lines.push('---', '');
              lines.push('### 🕸️ Transitive dependency graph (GitGraph)', '');
              // Strip the marker + heading from the GitGraph markdown
              const cleaned = ggMarkdown
                .replace(/<!-- dependency-analysis-bot -->\n?/, '')
                .replace(/^## .+?\n/m, '')
                .trim();
              lines.push(cleaned);
              lines.push('');
            }

            lines.push('---', '');
            lines.push(`📑 Full report: ${reportUrl}`);

            const body = lines.join('\n');

            // Update the existing bot comment, if any.
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(
              c => c.body && c.body.includes('<!-- impact-analysis-bot -->')
            );
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner, repo: context.repo.repo,
                comment_id: existing.id, body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body,
              });
            }

  # ---------------------------------------------------------------------------
  # 3) Cumulative Pages deployment. Accumulates every report under
  # reports/<dep>/<before>-to-<after>/run-<id>/ on the gh-pages-history branch
  # so Dependabot PR comments get permanent URLs.
  # ---------------------------------------------------------------------------
  deploy-pages:
    needs: analyze
    if: always() && needs.analyze.result == 'success'
    runs-on: ubuntu-latest
    concurrency:
      group: impact-pages-deploy
      cancel-in-progress: false
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: impact-report-site
          path: new-report/

      - uses: actions/checkout@v4
        with:
          ref: gh-pages-history
          path: pages-payload
          fetch-depth: 1
        continue-on-error: true

      - run: "[ -d pages-payload ] || mkdir -p pages-payload"

      - name: Merge into cumulative site
        env:
          REPORT_PATH: ${{ needs.analyze.outputs.report_path }}
          REPO_NAME:   ${{ github.event.repository.name }}
          REPO_OWNER:  ${{ github.repository_owner }}
        run: |
          set -euo pipefail
          mkdir -p "$(dirname "pages-payload/$REPORT_PATH")"
          cp -R new-report/"$REPORT_PATH" pages-payload/"$REPORT_PATH"
          python3 - <<'PY'
          import html, json, os
          from pathlib import Path
          root = Path('pages-payload')
          rn, ro = os.environ['REPO_NAME'], os.environ['REPO_OWNER']
          bp = f"/{rn}" if rn != f"{ro}.github.io" else ""
          crp = os.environ['REPORT_PATH']
          lh = f"{bp}/{crp}/"
          reports = []
          for f in sorted(root.glob('reports/*/*/run-*/index.html'), reverse=True):
              rp = str(f.parent.relative_to(root))
              sp = f.parent / 'summary.json'
              d = b = a = r = 'unknown'
              if sp.exists():
                  s = json.loads(sp.read_text())
                  d = s.get('dependency_group', d)
                  b = s.get('version_before', b)
                  a = s.get('version_after', a)
                  r = s.get('risk_level', r)
              reports.append(dict(p=rp,d=d,b=b,a=a,r=r))
          e = lambda v: html.escape(str(v), quote=True)
          rows = '\n'.join(
              f'<tr><td><a href="{e(bp+"/"+i["p"]+"/")}">{e(i["p"].split("/")[-1])}</a></td>'
              f'<td>{e(i["d"])}</td><td>{e(i["b"])}</td><td>{e(i["a"])}</td><td>{e(i["r"])}</td></tr>'
              for i in reports
          ) or '<tr><td colspan="5">No reports.</td></tr>'
          (root/'index.html').write_text(
              '<!doctype html><html lang="en"><head><meta charset="utf-8"/>'
              '<title>Impact Reports</title>'
              '<style>body{font-family:system-ui;margin:2rem auto;max-width:1000px;padding:0 1rem}'
              'table{border-collapse:collapse;width:100%;margin:1.5rem 0}'
              'th,td{border:1px solid #e5e7eb;padding:.65rem;text-align:left}'
              'th{background:#f9fafb}.c{background:#f9fafb;border:1px solid #e5e7eb;'
              'border-radius:.5rem;padding:1rem;margin:1rem 0}</style></head><body>'
              '<h1>Dependency Impact Analysis Reports</h1>'
              f'<div class="c"><strong>Latest:</strong> <a href="{e(lh)}">{e(crp)}</a></div>'
              '<table><thead><tr><th>Run</th><th>Dependency</th>'
              '<th>Before</th><th>After</th><th>Risk</th></tr></thead>'
              f'<tbody>{rows}</tbody></table></body></html>'
          )
          ld = root/'reports'/'latest'
          ld.mkdir(parents=True, exist_ok=True)
          (ld/'index.html').write_text(
              f'<!doctype html><html><head>'
              f'<meta http-equiv="refresh" content="0;url={e(lh)}"/></head>'
              f'<body><a href="{e(lh)}">Latest</a></body></html>'
          )
          PY

      - name: Persist history
        run: |
          cd pages-payload
          rm -rf .git
          git init
          git checkout -b gh-pages-history
          git config user.name  'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .
          git commit -m "Publish ${{ needs.analyze.outputs.report_path }}"
          git push --force "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}.git" gh-pages-history

      - uses: actions/upload-pages-artifact@v4
        with:
          path: pages-payload/

      - uses: actions/deploy-pages@v4
